version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kairox-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://kairox:kairox_dev@postgres:5432/kairox_db?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kairox-worker
    restart: unless-stopped
    command: npm run worker
    environment:
      - DATABASE_URL=postgresql://kairox:kairox_dev@postgres:5432/kairox_db?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  postgres:
    image: postgres:16-alpine
    container_name: kairox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kairox
      POSTGRES_PASSWORD: kairox_dev
      POSTGRES_DB: kairox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kairox-redis
    restart: unless-stopped
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

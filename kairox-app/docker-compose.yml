version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kairox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kairox
      POSTGRES_PASSWORD: kairox_dev
      POSTGRES_DB: kairox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kairox-redis
    restart: unless-stopped
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
